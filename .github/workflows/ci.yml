name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-macos:
    name: Test on macOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.0"
          skip-verify-signature: true

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test

  test-linux:
    name: Test on Linux
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.0"
          skip-verify-signature: true

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test

  test-windows:
    name: Test on Windows
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.2"
          skip-verify-signature: true

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test
